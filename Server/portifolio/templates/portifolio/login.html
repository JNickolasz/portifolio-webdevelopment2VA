{% extends 'core/base.html' %}
{% load static %}

{% block title %} Login - Administrador {% endblock %}

{% block content %}
    <div class="secao card card-login" style="max-width: 400px; margin: 40px auto; text-align: center; display: flex; flex-direction: column; gap: 1.2rem; padding: 2.5rem;">
        <h3 style="background: linear-gradient(135deg, #ffffff 0%, #a78bfa 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0;">Login do Administrador</h3>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 0.5rem;">Insira suas credenciais para acessar o painel de edição do portfólio.</p>
        
        <div class="form-group">
            <label for="login-username-page">Username:</label>
            <input type="text" id="login-username-page" placeholder="">
        </div>
        <div class="form-group">
            <label for="login-password-page">Password:</label>
            <input type="password" id="login-password-page" placeholder="">
        </div>
        <p id="login-erro-page" class="error-msg" style="display: none;"></p>
        
        <div class="form-actions" style="justify-content: center; margin-top: 0.5rem; margin-bottom: 0 !important;">
            <button id="btn-login-page">Entrar</button>
            <a href="{% url 'portifolio:home' %}" class="btn-cancel" style="padding: 12px 24px !important; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; height: 46px; border-radius: 12px; font-weight: 600; box-shadow: none !important; font-size: 0.95rem;">Cancelar</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnLoginPage = document.getElementById('btn-login-page');
            const fieldPassword = document.getElementById('login-password-page');
            const loginErroPage = document.getElementById('login-erro-page');

            function doLogin() {
                const username = document.getElementById('login-username-page').value;
                const password = fieldPassword.value;
                loginErroPage.style.display = 'none';

                fetch(API_BASE + '/api/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password }),
                })
                .then(response => {
                    if (!response.ok) throw new Error('Usuário ou senha incorretos.');
                    return response.json();
                })
                .then(data => {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.showFeedback('Login realizado com sucesso! Redirecionando...', 'success', function() {
                        window.location.href = "{% url 'portifolio:home' %}";
                    });
                })
                .catch(erro => {
                    loginErroPage.textContent = erro.message;
                    loginErroPage.style.display = 'block';
                    window.showFeedback('Erro ao realizar login.', 'error');
                });
            }

            if (btnLoginPage) {
                btnLoginPage.addEventListener('click', doLogin);
            }
            if (fieldPassword) {
                fieldPassword.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        doLogin();
                    }
                });
            }
        });
    </script>
{% endblock %}
